version: "3.8"

services:
  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aura-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - aura-network

  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aura-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-aura-vault-dev-secret}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      - CACHE_DEFI_PRICE_TTL=${CACHE_DEFI_PRICE_TTL:-30}
      - CACHE_DEFI_POOL_TTL=${CACHE_DEFI_POOL_TTL:-60}
      - CACHE_API_TTL=${CACHE_API_TTL:-60}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - aura-network

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOROBAN_RPC_URL=${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      - NEXT_PUBLIC_NETWORK_PASSPHRASE=${NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - aura-network

  # ── Contract Builder ────────────────────────────────────────────
  contract-builder:
    build:
      context: ./aura-vault
      dockerfile: Dockerfile
    container_name: aura-contract-builder
    volumes:
      - contract_artifacts:/app
    networks:
      - aura-network

volumes:
  contract_artifacts:
  redis_data:

networks:
  aura-network:
    driver: bridge
