version: "3.8"

services:
  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aura-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOROBAN_RPC_URL=${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      - NEXT_PUBLIC_NETWORK_PASSPHRASE=${NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - aura-network

  # ── Contract Builder ────────────────────────────────────────────
  contract-builder:
    build:
      context: ./aura-vault
      dockerfile: Dockerfile
    container_name: aura-contract-builder
    volumes:
      - contract_artifacts:/app
    networks:
      - aura-network

volumes:
  contract_artifacts:

networks:
  aura-network:
    driver: bridge
