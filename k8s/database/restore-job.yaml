apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-restore
  namespace: aura-vault
  labels:
    app: postgres-restore
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: postgres-restore
    spec:
      serviceAccountName: postgres
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      restartPolicy: OnFailure
      containers:
        - name: postgres-restore
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PGHOST
              value: "postgres-service"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: "aura"
            - name: PGDATABASE
              value: "aura_vault"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: RESTORE_FILE
              value: "/backups/aura_vault_YYYYMMDD_HHMMSS.sql.gz"
          volumeMounts:
            - name: backup-storage
              mountPath: /backups
          command:
            - /bin/sh
            - -c
            - |
              set -e
              RESTORE_FILE="${RESTORE_FILE}"

              if [ ! -f "$RESTORE_FILE" ]; then
                echo "Error: Restore file not found: $RESTORE_FILE"
                exit 1
              fi

              echo "Starting restore from $RESTORE_FILE at $(date)"

              # Drop existing connections
              psql -h $PGHOST -p $PGPORT -U $PGUSER -d postgres -c \
                "SELECT pg_terminate_backend(pg_stat_activity.pid) FROM pg_stat_activity WHERE pg_stat_activity.datname = '$PGDATABASE' AND pid <> pg_backend_pid();"

              # Drop and recreate database
              dropdb -h $PGHOST -p $PGPORT -U $PGUSER -i $PGDATABASE || true
              createdb -h $PGHOST -p $PGPORT -U $PGUSER $PGDATABASE

              # Restore from backup
              gunzip -c "$RESTORE_FILE" | psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE

              if [ $? -eq 0 ]; then
                echo "Restore completed successfully at $(date)"
              else
                echo "Restore failed"
                exit 1
              fi
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
      volumes:
        - name: backup-storage
          persistentVolumeClaim:
            claimName: postgres-backup-pvc
