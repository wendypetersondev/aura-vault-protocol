apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: aura-vault
  labels:
    app: postgres-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: postgres-backup
        spec:
          serviceAccountName: postgres
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            fsGroup: 999
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: postgres:16-alpine
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: PGHOST
                  value: "postgres-service"
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: "aura"
                - name: PGDATABASE
                  value: "aura_vault"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backend-secrets
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR="/backups"
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="$BACKUP_DIR/aura_vault_$TIMESTAMP.sql.gz"

                  echo "Starting backup at $(date)"
                  pg_dump -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE | gzip > "$BACKUP_FILE"

                  if [ $? -eq 0 ]; then
                    echo "Backup completed successfully: $BACKUP_FILE"
                    ls -lh "$BACKUP_FILE"

                    # Keep only last 7 days of backups
                    find $BACKUP_DIR -name "aura_vault_*.sql.gz" -type f -mtime +7 -delete
                    echo "Cleaned up old backups older than 7 days"
                  else
                    echo "Backup failed"
                    exit 1
                  fi
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
