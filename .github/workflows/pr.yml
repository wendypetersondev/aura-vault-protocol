name: PR Checks

on:
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aura-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aura-vault/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --manifest-path aura-vault/Cargo.toml -- --check

      - name: Run clippy
        run: cargo clippy --manifest-path aura-vault/Cargo.toml --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aura-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('aura-vault/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --manifest-path aura-vault/Cargo.toml

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit --manifest-path aura-vault/Cargo.toml

  build:
    name: Build Wasm
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            aura-vault/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('aura-vault/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Wasm
        run: cargo build --manifest-path aura-vault/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Check Wasm size
        run: |
          WASM=aura-vault/target/wasm32-unknown-unknown/release/aura_vault.wasm
          SIZE=$(wc -c < "$WASM")
          echo "Wasm size: ${SIZE} bytes"
          # Soroban max contract size is 65536 bytes (64 KiB)
          if [ "$SIZE" -gt 65536 ]; then
            echo "ERROR: Wasm binary exceeds 64 KiB Soroban limit"
            exit 1
          fi

      - name: Upload Wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-vault-wasm-pr-${{ github.event.number }}
          path: aura-vault/target/wasm32-unknown-unknown/release/aura_vault.wasm
          retention-days: 7
