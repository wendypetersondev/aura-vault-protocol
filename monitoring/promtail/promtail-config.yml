server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log

  - job_name: aura-vault
    static_configs:
      - targets:
          - localhost
        labels:
          job: aura-vault
          service: aura-vault-protocol
          __path__: /var/log/aura-vault/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            message: msg
            timestamp: timestamp
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339
