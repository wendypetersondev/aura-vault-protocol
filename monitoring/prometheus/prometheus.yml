global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "aura-vault-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: "aura-vault-api"
          environment: "development"

  - job_name: "aura-vault-frontend"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3002"]
        labels:
          service: "aura-vault-frontend"
          environment: "development"

  - job_name: "node-exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "node-exporter"
