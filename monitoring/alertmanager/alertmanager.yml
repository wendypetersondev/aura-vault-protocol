global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "default"
      repeat_interval: 4h

receivers:
  - name: "default"
    # Configure webhook, email, or Slack here
    # webhook_configs:
    #   - url: "http://host.docker.internal:3000/api/alerts"

  - name: "critical"
    # webhook_configs:
    #   - url: "http://host.docker.internal:3000/api/alerts/critical"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
